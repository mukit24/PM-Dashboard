<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FY 2024-25 Ministry Financial Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8">

    <nav class="max-w-7xl mx-auto mb-4 flex justify-end">
        <a href="index.html" class="inline-flex items-center gap-2 bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-xs font-semibold tracking-wide transition shadow-sm">
            <i class="fa-solid fa-arrow-left text-slate-500"></i> Back to Dashboard
        </a>
    </nav>

    <header class="max-w-7xl mx-auto mb-8 bg-white border border-slate-200 rounded-xl p-6 shadow-md flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="text-xs font-bold tracking-widest text-emerald-600 uppercase mb-1">
                <i class="fa-solid fa-chart-line mr-1"></i> Performance Monitoring Ledger
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-slate-900 tracking-tight">
                Financial Progress of Ministries/Divisions Above National Average (30.63%)
            </h1>
            <p class="text-xs text-slate-500 mt-1">Fiscal Year 2024-2025 | Data Source: IMED, Ministry of Planning</p>
        </div>
        
        <div class="bg-slate-100 border border-slate-200 px-5 py-2 rounded-lg text-center md:text-right w-full md:w-auto shadow-sm self-stretch md:self-auto">
            <span class="text-[10px] uppercase text-slate-500 block font-semibold tracking-wider">National Average</span>
            <span class="text-xl font-black text-amber-600">30.63%</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <section class="bg-white border border-slate-200 rounded-xl p-4 md:p-6 shadow-md">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 border-b border-slate-100 pb-4 gap-3">
                <h2 class="text-sm md:text-base font-bold text-slate-800 uppercase tracking-wide flex items-center">
                    <i class="fa-solid fa-bars-progress text-indigo-500 mr-2"></i> 
                    Implementation Metrics Profile (25 Ministries/Divisions)
                </h2>
            </div>

            <div class="relative w-full overflow-x-auto min-h-[500px]">
                <canvas id="unifiedPerformanceChart" class="min-w-[1200px] max-h-[480px]"></canvas>
            </div>
        </section>
    </main>

    <script>
        // Register the DataLabels plugin to Chart.js globally
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        } else {
            console.error("ChartDataLabels failed to initialize.");
        }

        // Integrated Single Source Dataset from Ledger Image
        const highPerformersData = {
            labels: [
                'Ministry of Science and Technology',
                'Cabinet Division',
                'Energy and Mineral Resources Division',
                'Bangladesh Public Service Commission Secretariat',
                'Ministry of Cultural Affairs',
                'Ministry of Labour and Employment',
                'Ministry of Agriculture',
                'Legislative and Parliament Affairs Division',
                'Technical and Madrasah Education Division',
                'Ministry of Textiles & Jute',
                'Ministry of Water Resources',
                'Secondary and Higher Education Division',
                'Economic Relations Division (ERD)',
                'Ministry of Land',
                'Ministry of Social Welfare',
                'Implementation Monitoring and Evaluation Division (IMED)',
                'Ministry of Civil Aviation and Tourism',
                'Ministry of Industry',
                'Information and Communication Technology Division',
                'Ministry of Fisheries and Livestock',
                'Power Division',
                'Bridges Division',
                'Ministry of Disaster Management and Relief',
                'Road Transport and Highways Division',
                'Anti Corruption Commission'
            ],
            percentages: [
                88.66, 67.29, 60.82, 58.35, 50.79, 49.12, 46.95, 45.58, 45.03, 44.93, 
                43.99, 42.79, 42.37, 40.94, 40.63, 39.80, 39.78, 39.69, 37.77, 35.98, 
                35.61, 35.46, 34.28, 33.72, 33.04
            ]
        };

        const ctx = document.getElementById('unifiedPerformanceChart').getContext('2d');
        const performanceChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: highPerformersData.labels,
                datasets: [{
                    data: highPerformersData.percentages,
                    backgroundColor: '#2e6f40', // Professional Emerald Green tone for high-performance vectors
                    borderColor: '#1b4d24',
                    borderWidth: 1,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        enabled: true,
                        callbacks: {
                            label: (context) => ` Progress: ${context.raw}%`
                        }
                    },
                    datalabels: {
                        color: '#ffffff',
                        anchor: 'end',
                        align: 'bottom',
                        offset: 8,
                        rotation: -90, 
                        font: { weight: '600', size: 11 },
                        formatter: (value) => value.toFixed(2) + '%'
                    }
                },
                scales: {
                    y: {
                        min: 0,
                        max: 100,
                        ticks: { color: '#64748b', callback: (value) => value + '%' },
                        grid: { color: '#e2e8f0', borderDash: [3, 3] }
                    },
                    x: {
                        ticks: {
                            color: '#1e293b',
                            font: { size: 10, weight: '500' },
                            maxRotation: 65,
                            minRotation: 65
                        },
                        grid: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
