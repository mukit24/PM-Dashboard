<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FY 2024-25 Underperforming Ministries Performance Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8">

    <nav class="max-w-7xl mx-auto mb-4 flex justify-end">
        <a href="index.html" class="inline-flex items-center gap-2 bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-xs font-semibold tracking-wide transition shadow-sm">
            <i class="fa-solid fa-arrow-left text-slate-500"></i> Back to Dashboard
        </a>
    </nav>

    <header class="max-w-7xl mx-auto mb-8 bg-white border border-slate-200 rounded-xl p-6 shadow-md flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="text-xs font-bold tracking-widest text-rose-600 uppercase mb-1">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> Critical Monitoring Ledger
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-slate-900 tracking-tight">
                Financial Progress of Ministries/Divisions Below National Average (30.63%)
            </h1>
            <p class="text-xs text-slate-500 mt-1">Fiscal Year 2024-2025 | Data Source: IMED, Ministry of Planning</p>
        </div>
        <div class="bg-slate-100 border border-slate-200 px-5 py-2 rounded-lg text-center md:text-right w-full md:w-auto shadow-sm self-stretch md:self-auto">
            <span class="text-[10px] uppercase text-slate-500 block font-semibold tracking-wider">National Average</span>
            <span class="text-xl font-black text-rose-600">30.63%</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">

        <section class="bg-white border border-slate-200 rounded-xl p-4 md:p-6 shadow-md">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 border-b border-slate-100 pb-4 gap-3">
                <h2 class="text-sm md:text-base font-bold text-slate-800 uppercase tracking-wide flex items-center">
                    <i class="fa-solid fa-arrow-trend-down text-rose-500 mr-2"></i> 
                    Ministries / Divisions With Implementation Deficits
                </h2>
                
                <div class="inline-flex p-1 bg-slate-100 rounded-lg border border-slate-200">
                    <button id="btnRank1" onclick="switchDataset('rank1')" class="px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 shadow-sm bg-white text-slate-900 font-semibold">
                        <i class="fa-solid fa-arrow-down-short-wide text-rose-500 mr-1.5"></i> Rank 26 - 41
                    </button>
                    <button id="btnRank2" onclick="switchDataset('rank2')" class="px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 text-slate-600 hover:text-slate-900">
                        <i class="fa-solid fa-arrow-down-wide-short text-amber-500 mr-1.5"></i> Rank 42 - 57
                    </button>
                </div>
            </div>

            <div class="relative w-full overflow-x-auto min-h-[460px]">
                <canvas id="chartUnderperformers" class="min-w-[950px] max-h-[460px]"></canvas>
            </div>
        </section>

    </main>

    <script>
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        } else {
            console.error("ChartDataLabels failed to initialize. Please check network restrictions on CDNs.");
        }

        const dataRepository = {
            rank1: {
                labels: [
                    "Ministry of Expatriates' Welfare and Overseas Employment",
                    'Rural Development and Co-operatives Division',
                    'Ministry of Foreign Affairs',
                    'Ministry of Shipping',
                    'Statistics and Informatics Division',
                    "Ministry of Women and Childrens' Affairs",
                    'Ministry of Railways',
                    'Ministry of Liberation War Affairs',
                    'Ministry of Food',
                    'Ministry of Defence',
                    'Ministry of Youth and Sports',
                    'Financial Institutions Division',
                    'Ministry of Housing and Public Works',
                    'Law and Justice Division',
                    'Bangladesh Election Commission Secretariat',
                    "The Prime Minister's Office"
                ],
                data: [29.82, 28.99, 26.71, 26.42, 25.99, 25.88, 24.49, 24.20, 22.33, 21.99, 21.11, 20.41, 18.86, 18.78, 17.60, 14.03],
                color: '#B91C1C',
                borderColor: '#991B1B',
                yMax: 35
            },
            rank2: {
                labels: [
                    'Ministry of Information and Broadcasting',
                    'Posts and Telecommunication Division',
                    'Ministry of Environment, Forest and Climate Change',
                    'Ministry of Religious Affairs',
                    'Internal Resources Division (IRD)',
                    'Ministry of Commerce',
                    'Medical Education and Family Welfare Division',
                    'Health Service Division',
                    'Security Services Division',
                    'Public Security Division',
                    'Ministry of Chittagong Hill Traits Affairs',
                    'Ministry of Primary and Mass Education',
                    'Local Government Division',
                    'Ministry of Public Administration',
                    'Planning Division',
                    'Bangladesh Parliament Secretariat'
                ],
                data: [12.51, 10.95, 10.82, 10.81, 10.19, 9.05, 8.72, 8.38, 4.47, 4.41, 2.81, 2.13, 1.48, 1.31, 0.002, 0.00],
                color: '#E11D48',
                borderColor: '#BE123C',
                yMax: 14
            }
        };

        const ctx = document.getElementById('chartUnderperformers').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dataRepository.rank1.labels,
                datasets: [{
                    data: dataRepository.rank1.data,
                    backgroundColor: dataRepository.rank1.color,
                    borderColor: dataRepository.rank1.borderColor,
                    borderWidth: 1,
                    barPercentage: 0.55
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        enabled: true,
                        callbacks: {
                            label: (context) => ` Progress: ${context.raw}%`
                        }
                    },
                    datalabels: {
                        // If value is less than 4.0%, use dark text color; else keep white text inside the bar
                        color: (context) => context.dataset.data[context.dataIndex] < 4.0 ? '0f172a' : '#ffffff',
                        
                        // Force label positioning safely clear of the outer boundary edges
                        anchor: (context) => context.dataset.data[context.dataIndex] < 4.0 ? 'end' : 'end',
                        align: (context) => context.dataset.data[context.dataIndex] < 4.0 ? 'top' : 'bottom',
                        
                        // Give explicit structural margin space when rendering above small bars
                        offset: (context) => context.dataset.data[context.dataIndex] < 4.0 ? 6 : 12,
                        
                        // Keep text completely unrotated (horizontal) for tiny bars so it reads neatly above them
                        rotation: (context) => context.dataset.data[context.dataIndex] < 4.0 ? 0 : -90,
                        
                        font: { weight: '700', size: 11 },
                        formatter: (value) => value.toFixed(2) + '%'
                    }
                },
                scales: {
                    y: {
                        min: 0,
                        max: dataRepository.rank1.yMax,
                        ticks: { color: '#64748b', callback: (value) => value + '%' },
                        grid: { color: '#e2e8f0', borderDash: [3, 3] }
                    },
                    x: {
                        ticks: {
                            color: '#1e293b',
                            font: { size: 10, weight: '500' },
                            maxRotation: 75,
                            minRotation: 75
                        },
                        grid: { display: false }
                    }
                }
            }
        });

        function switchDataset(targetKey) {
            const selectedSet = dataRepository[targetKey];
            const btn1 = document.getElementById('btnRank1');
            const btn2 = document.getElementById('btnRank2');

            if (targetKey === 'rank1') {
                btn1.className = "px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 shadow-sm bg-white text-slate-900 font-semibold";
                btn2.className = "px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 text-slate-600 hover:text-slate-900";
            } else {
                btn2.className = "px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 shadow-sm bg-white text-slate-900 font-semibold";
                btn1.className = "px-4 py-1.5 rounded-md text-xs font-medium tracking-wide transition duration-150 text-slate-600 hover:text-slate-900";
            }

            chart.data.labels = selectedSet.labels;
            chart.data.datasets[0].data = selectedSet.data;
            chart.data.datasets[0].backgroundColor = selectedSet.color;
            chart.data.datasets[0].borderColor = selectedSet.borderColor;
            chart.options.scales.y.max = selectedSet.yMax;

            chart.update();
        }
    </script>
</body>
</html>
