            // Handle Sector Filter Router
            filteredProjects = allProjects.filter(project => project.sector === selectedSector);
            currentMeta = sectorMetadata[selectedSector] || { count: filteredProjects.length, desc: "" };
            badgeText = `${selectedSector} Sector`;

            // Map color styles dynamically based on selection requirement
            const sectorColorMap = {
                "Infrastructure": "badge-blue",
                "Education": "badge-purple", // Make sure to add .badge-purple to your CSS if missing
                "Health": "badge-red",
                "Transport": "badge-green",
                "Power and Energy": "badge-orange"     // Using theme orange for yellow/gold accent matching
            };
            badgeColorClass = sectorColorMap[selectedSector] || "badge-blue";

        } else if (selectedType) {
            // Handle Project Type Filter Router
            filteredProjects = allProjects.filter(project => project.projectType === selectedType);
            currentMeta = typeMetadata[selectedType] || { count: filteredProjects.length, desc: "" };
            badgeText = `${selectedType} Projects`;

            const typeColorMap = {
                "Own Fund": "badge-green",
                "DPP": "badge-blue",
                "Feasibility": "badge-orange",
                "TAPP": "badge-skyblue"
            };
            badgeColorClass = typeColorMap[selectedType] || "badge-blue";

        } else {
            // Default Fallback: Handle Range Completion Filter Router
            const activeRange = selectedRange || '0-30%';
            filteredProjects = allProjects.filter(project => project.range === activeRange);
            currentMeta = stageMetadata[activeRange] || { count: filteredProjects.length, desc: "" };
            badgeText = `${activeRange} Completion`;

            const badgeMap = {
                "0-30%": "badge-red",
                "30-60%": "badge-orange",
                "60-80%": "badge-green",
                "80-100%": "badge-blue"
            };
            badgeColorClass = badgeMap[activeRange] || "badge-red";
        }

        filteredProjects.sort((a, b) => parseInt(a.completion) - parseInt(b.completion));

        // =========================
        // UPDATE BADGES & TITLES
        // =========================
        const badge = document.getElementById('filterBadge');
        badge.className = `filter-badge ${badgeColorClass}`;
        badge.innerText = badgeText;

        if (selectedSector) {
            document.getElementById('pageTitle').innerText = `${selectedSector} Sector Projects`;
        } else if (selectedType) {
            document.getElementById('pageTitle').innerText = `${selectedType} Projects`;
        } else {
            document.getElementById('pageTitle').innerText = `${selectedRange || '0-30%'} Completion Projects`;
        }

        // 3. Update Header Subtitle with full dynamic meta counts and descriptions
        // 3. Update Header Subtitle with matching container style
        document.getElementById('projectCount').innerHTML = `
        <span style="background: #eff3f8; color: #1a4d66; padding: 6px 16px; border-radius: 30px; font-weight: 600; font-size: 0.85rem; display: inline-flex; align-items: center;">
            ${currentMeta.count} projects · ${currentMeta.desc}
        </span>
        `;

        // 4. Update Table Bottom Paginator Information Text dynamically
        const totalCountText = document.querySelector('.pagination-info');
        if (totalCountText) {
            totalCountText.innerText = `Showing 1-10 of ${currentMeta.count} projects`;
        }

        // =========================
        // RENDER TABLE
        // =========================

        const tableBody = document.getElementById('projectTableBody');

        function renderProjects(projects) {

            tableBody.innerHTML = '';

            projects.forEach(project => {

                let statusClass = "status-red";

                if (project.range === "30-60%") {
                    statusClass = "status-orange";
                }
                else if (project.range === "60-80%") {
                    statusClass = "status-green";
                }
                else if (project.range === "80-100%") {
                    statusClass = "status-blue";
                }

                tableBody.innerHTML += `
                <tr>
                        <td>
                            <div class="project-name">${project.name}</div>
                            <div>${project.pdName}</div>
                        </td>
                        <td>${project.projectType}</td>
                        <td>${project.sector}</td>
                        <td>${project.ministry}</td>
                        <td>${project.estimatedCost}</td>
                        <td>${project.completion}</td>
                    </tr>
                `;
            });
        }

        renderProjects(filteredProjects);

        // =========================
        // SEARCH
        // =========================

        document.getElementById('searchInput')
            .addEventListener('keyup', function () {

                const value = this.value.toLowerCase();

                const searchedProjects = filteredProjects.filter(project =>
                    project.name.toLowerCase().includes(value)
                );

                renderProjects(searchedProjects);
            });

    </script>

</body>

</html>
